<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Побег от Наталии</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        body { margin: 0; overflow: hidden; background: #ffffff; font-family: sans-serif; touch-action: none; }
        canvas { display: block; }
        #score { position: fixed; top: 10px; left: 10px; font-size: 24px; font-weight: bold; z-index: 2; pointer-events: none; }
        
        /* Стили для счетчика в меню */
        .online-badge { 
            background: #eef2ff; 
            color: #4f46e5; 
            padding: 5px 15px; 
            border-radius: 20px; 
            font-size: 14px; 
            font-weight: bold; 
            margin-bottom: -5px; 
            border: 1px solid #e0e7ff;
        }

        #slowStatus { 
            position: fixed; top: 10px; right: 10px; font-size: 20px; font-weight: bold; 
            color: #3b82f6; display: none; z-index: 2; background: rgba(255,255,255,0.7);
            padding: 5px 10px; border-radius: 8px;
        }

        #freezeOverlay {
            position: fixed; inset: 0; display: flex; justify-content: center; align-items: center;
            font-size: 150px; pointer-events: none; z-index: 5; opacity: 0;
            transition: transform 0.5s ease-out, opacity 0.5s ease-out;
        }

        .overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.95); display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 15px; z-index: 10; padding: 20px; text-align: center; }
        button { padding: 15px 30px; font-size: 20px; cursor: pointer; border: none; background: #007bff; color: white; border-radius: 10px; width: 250px; transition: 0.2s; }
        button:active { transform: scale(0.95); }
        input { padding: 15px; font-size: 18px; border: 2px solid #ddd; border-radius: 10px; width: 250px; outline: none; }
        
        .tg-button { background: #24A1DE !important; margin-top: 10px; display: flex; align-items: center; justify-content: center; text-decoration: none; color: white; }
        .tg-subtext { font-size: 12px; color: #888; margin-top: -5px; }

        .leaderboard-table { width: 100%; max-width: 300px; border-collapse: collapse; margin-top: 10px; background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .leaderboard-table th { background: #6c757d; color: white; padding: 10px; }
        .leaderboard-table td { padding: 8px; border-bottom: 1px solid #eee; }
        .leaderboard-table tr:nth-child(even) { background: #f8f9fa; }
        .scroll-area { max-height: 300px; overflow-y: auto; width: 100%; display: flex; justify-content: center; }
    </style>
</head>
<body>

<div id="score">Очки: 0</div>
<div id="slowStatus">❄️ <span id="slowFrames">0</span></div>
<div id="freezeOverlay">🥶</div>

<div id="menu" class="overlay">
    <div id="onlineCount" class="online-badge">Онлайн: ...</div>
    
    <h1 style="margin-top: 0;">Побег от Наталии 😈</h1>
    <input id="nameInput" placeholder="Введите имя" maxlength="15">
    <button onclick="startGame()">Играть</button>
    <button onclick="showLeaderboard()" style="background:#6c757d">🏆 Лидеры</button>
    <a href="https://t.me/+godxyKIhKEs3Zjhi" target="_blank" style="text-decoration: none;">
        <button class="tg-button">📢 Наш Telegram</button>
    </a>
    <div class="tg-subtext">Свежие новости и обновления игры здесь!</div>
</div>

<div id="leaderboard" class="overlay" style="display: none;">
    <h1>🏆 ТОП ИГРОКОВ</h1>
<div class="scroll-area">
    <table class="leaderboard-table">
        <thead>
            <tr><th colspan="3">🏆 РЕКОРД</th></tr>
            <tr><th>#</th><th>Имя</th><th>Score</th></tr>
        </thead>
        <tbody id="leaderboardBody"></tbody>
    </table>
</div>

<div class="scroll-area" style="margin-top:15px;">
    <table class="leaderboard-table">
        <thead>
            <tr><th colspan="3">📊 TOTAL</th></tr>
            <tr><th>#</th><th>Имя</th><th>Total</th></tr>
        </thead>
        <tbody id="leaderboardTotalBody"></tbody>
    </table>
</div>
    <button onclick="closeLeaderboard()" style="background:#6c757d">Назад</button>
</div>

<div id="gameOver" class="overlay" style="display: none;">
    <h1>Тебя поймала Наталия! 😈</h1>
    <p id="finalScore" style="font-size: 24px;"></p>
    <button onclick="restart()">Играть снова</button>
    <button onclick="backToMenu()" style="background:#6c757d">В меню</button>
</div>

<canvas id="game"></canvas>

<script>
const SB_URL = "https://zwzrnkpygvfgzsyzjjsy.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp3enJua3B5Z3ZmZ3pzeXpqanN5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4MzUwMTMsImV4cCI6MjA5MTQxMTAxM30.EgZcfaL3dO0nv2utfaIYYk3ROfKdZO__psw2Pk0q6qo";
let supabaseClient; 

try { 
    supabaseClient = window.supabase.createClient(SB_URL, SB_KEY);
    initOnlineCounter();
} catch (e) { console.error("Supabase error", e); }

async function initOnlineCounter() {
    const channel = supabaseClient.channel('online-users', {
        config: { presence: { key: 'user' } }
    });

    channel
        .on('presence', { event: 'sync' }, () => {
            const state = channel.presenceState();
            const count = Object.keys(state).length;
            document.getElementById("onlineCount").innerText = "Онлайн: " + count;
        })
        .subscribe(async (status) => {
            if (status === 'SUBSCRIBED') {
                await channel.track({ online_at: new Date().toISOString() });
            }
        });
}

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
let playerName = "";
let score = 0;
let running = false;
let animationId;
let slowTimer = 0;
let player = { x: 0, y: 0, r: 25 };
let enemy = { x: -200, y: -200, r: 35 };
let points = [];

const playerImg = new Image(); playerImg.src = "https://cdn-icons-png.flaticon.com/512/1946/1946429.png";
const enemyImg = new Image(); enemyImg.src = "natalia.jpg";

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const base = Math.min(window.innerWidth, window.innerHeight);
    player.r = base * 0.06;
    enemy.r = base * 0.08;
}
window.addEventListener("resize", resize);
resize();

function triggerFreezeAnim() {
    const el = document.getElementById("freezeOverlay");
    el.style.transition = "none";
    el.style.transform = "scale(0.5)";
    el.style.opacity = "1";
    setTimeout(() => {
        el.style.transition = "transform 0.5s ease-out, opacity 0.5s ease-out";
        el.style.transform = "scale(1.5)";
        el.style.opacity = "0";
    }, 50);
}

function spawnPoint() {
    const r = Math.random();
    let type;
    if (r < 0.78) type = "common";
    else if (r < 0.88) type = "rare";
    else if (r < 0.89) type = "yellow";
    else if (r < 0.96) type = "epic";
    else if (r < 0.99) type = "green";
    else type = "rainbow";

    points.push({
        x: Math.random() * (canvas.width - 50) + 25,
        y: Math.random() * (canvas.height - 50) + 25,
        r: canvas.width * 0.025,
        type: type
    });
}

function handleMove(e) {
    if (!running) return;
    const x = e.touches ? e.touches[0].clientX : e.clientX;
    const y = e.touches ? e.touches[0].clientY : e.clientY;
    player.x = x; player.y = y;
    if (e.cancelable) e.preventDefault();
}
window.addEventListener("mousemove", handleMove);
window.addEventListener("touchmove", handleMove, { passive: false });

function update() {
    if (!running) return;
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    let speed = (slowTimer > 0) ? 1.5 : (2 + score * 0.1);
    
    if (slowTimer > 0) {
        slowTimer--;
        document.getElementById("slowStatus").style.display = "block";
        document.getElementById("slowFrames").innerText = slowTimer;
    } else {
        document.getElementById("slowStatus").style.display = "none";
    }

    let dx = player.x - enemy.x;
    let dy = player.y - enemy.y;
    let dist = Math.hypot(dx, dy);

    if (dist > 1) {
        enemy.x += (dx / dist) * speed;
        enemy.y += (dy / dist) * speed;
    }

    points.forEach((p, i) => {
        ctx.beginPath();
        if (p.type === "rainbow") {
            let g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r);
            g.addColorStop(0, 'red'); g.addColorStop(0.4, 'yellow'); g.addColorStop(1, 'violet');
            ctx.fillStyle = g;
            ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
            ctx.fill();
        } else {
            const colors = { common: "#8B4513", rare: "#3b82f6", yellow: "#FFD700", epic: "#a855f7", green: "#10b981" };
            ctx.fillStyle = colors[p.type];
            ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
            ctx.fill();
        }

        if (Math.hypot(player.x - p.x, player.y - p.y) < player.r + p.r) {
            if (p.type === "common") score += 1;
            else if (p.type === "rare") { score += 1; slowTimer += 90; triggerFreezeAnim(); }
            else if (p.type === "yellow") { score += 1; slowTimer += 200; triggerFreezeAnim(); }
            else if (p.type === "epic") score += 3;
            else if (p.type === "green") score += 5;
            else if (p.type === "rainbow") score += 10;
            
            document.getElementById("score").innerText = "Очки: " + score;
            points.splice(i, 1);
            spawnPoint();
        }
    });

    ctx.drawImage(playerImg, player.x - player.r, player.y - player.r, player.r*2, player.r*2);
    ctx.save();
    ctx.beginPath(); ctx.arc(enemy.x, enemy.y, enemy.r, 0, Math.PI*2); ctx.clip();
    ctx.drawImage(enemyImg, enemy.x - enemy.r, enemy.y - enemy.r, enemy.r*2, enemy.r*2);
    ctx.restore();

    if (dist < player.r + enemy.r * 0.8) gameOver();
    else animationId = requestAnimationFrame(update);
}

function startGame() {
    playerName = document.getElementById("nameInput").value.trim();
    if (!playerName) return alert("Введите имя!");
    document.getElementById("menu").style.display = "none";
    score = 0; points = []; slowTimer = 0; enemy.x = -100;
    document.getElementById("score").innerText = "Очки: 0";
    for(let i=0; i<6; i++) spawnPoint();
    running = true; update();
}

function gameOver() {
    running = false;
    cancelAnimationFrame(animationId);
    saveToSupabase(score);
    document.getElementById("finalScore").innerText = "Счёт: " + score;
    document.getElementById("gameOver").style.display = "flex";
}

function restart() { document.getElementById("gameOver").style.display = "none"; startGame(); }
function backToMenu() { document.getElementById("gameOver").style.display = "none"; document.getElementById("menu").style.display = "flex"; }

async function showLeaderboard() {
    if (!supabaseClient) return;
    document.getElementById("leaderboard").style.display = "flex";
    document.getElementById("menu").style.display = "none";
    document.getElementById("leaderboardBody").innerHTML = "<tr><td colspan='3'>Загрузка...</td></tr>";
    document.getElementById("leaderboardTotalBody").innerHTML = "<tr><td colspan='3'>Загрузка...</td></tr>";

    const [bestRes, totalRes] = await Promise.all([
        supabaseClient.from("leaderboard").select("*").order("score", { ascending: false }).limit(10),
        supabaseClient.from("leaderboard").select("*").order("total_score", { ascending: false }).limit(10)
    ]);

    const best = bestRes.data;
    const total = totalRes.data;

    document.getElementById("leaderboardBody").innerHTML = best && best.length > 0
        ? best.map((p, i) => `<tr><td>${i+1}</td><td>${p.name}</td><td><b>${p.score}</b></td></tr>`).join("")
        : "<tr><td colspan='3'>Пусто</td></tr>";

    document.getElementById("leaderboardTotalBody").innerHTML = total && total.length > 0
        ? total.map((p, i) => `<tr><td>${i+1}</td><td>${p.name}</td><td><b>${p.total_score || 0}</b></td></tr>`).join("")
        : "<tr><td colspan='3'>Пусто</td></tr>";
}

function closeLeaderboard() { document.getElementById("leaderboard").style.display = "none"; document.getElementById("menu").style.display = "flex"; }

async function saveToSupabase(s) {
    if (!supabaseClient) return;
    try {
        const { data, error } = await supabaseClient.from("leaderboard").select("*").eq("name", playerName);
        if (error) throw error;
        if (!data || data.length === 0) {
            await supabaseClient.from("leaderboard").insert([{ name: playerName, score: s, total_score: s }]);
        } else {
            const user = data[0];
            const newBest = Math.max(s, user.score || 0);
            const newTotal = (user.total_score || 0) + s;
            await supabaseClient.from("leaderboard").update({ score: newBest, total_score: newTotal }).eq("name", playerName);
        }
    } catch (e) { console.error("Save Error:", e); }
}
</script>
</body>
</html>
