<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Побег от Наталии</title>
<style>
  body { margin: 0; overflow: hidden; background: #ffffff; font-family: Arial; }

  #score {
    position: fixed;
    top: 10px;
    left: 10px;
    font-size: 20px;
    z-index: 2;
  }

  /* ===== МЕНЮ ===== */
  #menu {
    position: fixed;
    inset: 0;
    background: rgba(255,255,255,0.95);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 12px;
    z-index: 10;
  }

  /* ===== GAME OVER ===== */
  #gameOver {
    position: fixed;
    inset: 0;
    background: rgba(255,255,255,0.9);
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 3;
  }

  button {
    padding: 10px 20px;
    font-size: 18px;
    cursor: pointer;
  }

  input {
    padding: 10px;
    font-size: 16px;
  }
</style>
</head>
<body>

<div id="score">Очки: 0</div>

<!-- ===== МЕНЮ ===== -->
<div id="menu">
  <h1>Побег от Наталии 😈</h1>

  <input id="nameInput" placeholder="Введите имя">

  <button onclick="startGame()">Играть</button>
  <button onclick="showLeaderboard()">🏆 Лидеры</button>
</div>

<!-- ===== GAME OVER ===== -->
<div id="gameOver">
  <h1>Тебя поймала Наталия 😈</h1>
  <p id="finalScore"></p>

  <button onclick="backToMenu()">В меню</button>
  <button onclick="restart()">Играть снова</button>
</div>

<canvas id="game"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

// ================== РЕКОРДЫ ==================
let playerName = "";
let score = 0;
let running = false;

function getLB() {
  return JSON.parse(localStorage.getItem("lb") || "[]");
}

function saveScore(score) {
  if (!playerName) return;

  let lb = getLB();
  let user = lb.find(u => u.name === playerName);

  if (user) {
    if (score > user.score) user.score = score;
  } else {
    lb.push({ name: playerName, score });
  }

  lb.sort((a,b) => b.score - a.score);
  localStorage.setItem("lb", JSON.stringify(lb));
}

function showLeaderboard() {
  let lb = getLB();

  alert(
    "🏆 РЕКОРДЫ:\n\n" +
    lb.map((p,i)=>`${i+1}. ${p.name} — ${p.score}`).join("\n")
  );
}

// ================== КАРТИНКИ ==================
let imagesLoaded = 0;
const totalImages = 2;

const playerImg = new Image();
playerImg.src = "https://cdn-icons-png.flaticon.com/512/1946/1946429.png";
playerImg.onload = () => imagesLoaded++;

const enemyImg = new Image();
enemyImg.src = "natalia.jpg";
enemyImg.onload = () => imagesLoaded++;
enemyImg.onerror = () => {
  enemyImg.src = "https://cdn-icons-png.flaticon.com/512/4140/4140048.png";
};

// ================== ИГРА ==================
let player, enemy, points, slowTimer;

function init() {
  player = { x: canvas.width/2, y: canvas.height/2, r: 25 };
  enemy = { x: 100, y: 100, r: 35, baseSpeed: 2, speed: 2 };
  points = [];
  score = 0;
  running = true;
  slowTimer = 0;

  document.getElementById("score").innerText = "Очки: 0";
  document.getElementById("gameOver").style.display = "none";

  for(let i = 0; i < 6; i++) spawnPoint();
}

function spawnPoint() {
  let rand = Math.random();
  let type;

  if (rand < 0.7) type = "common";
  else if (rand < 0.9) type = "rare";
  else type = "epic";

  points.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: 18,
    type
  });
}

// управление (НЕ ТРОГАЛ)
function move(e) {
  let rect = canvas.getBoundingClientRect();
  let x = e.touches ? e.touches[0].clientX : e.clientX;
  let y = e.touches ? e.touches[0].clientY : e.clientY;

  player.x = x - rect.left;
  player.y = y - rect.top;
}

canvas.addEventListener("mousemove", move);
canvas.addEventListener("touchmove", move, { passive: false });

function dist(a, b) {
  return Math.hypot(a.x - b.x, a.y - b.y);
}

function drawYarn(p) {
  if (p.type === "common") ctx.fillStyle = "#8B4513";
  if (p.type === "rare") ctx.fillStyle = "#3b82f6";
  if (p.type === "epic") ctx.fillStyle = "#a855f7";

  ctx.beginPath();
  ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
  ctx.fill();
}

function update() {
  if (!running) return;

  if (imagesLoaded < totalImages) {
    requestAnimationFrame(update);
    return;
  }

  ctx.clearRect(0,0,canvas.width,canvas.height);

  // скорость врага
  if (slowTimer > 0) {
    slowTimer--;
    enemy.speed = enemy.baseSpeed * 0.5;
  } else {
    enemy.speed = enemy.baseSpeed + score * 0.25;
  }

  let dx = player.x - enemy.x;
  let dy = player.y - enemy.y;
  let d = Math.hypot(dx, dy);

  if (d > 0) {
    enemy.x += dx / d * enemy.speed;
    enemy.y += dy / d * enemy.speed;
  }

  ctx.drawImage(playerImg, player.x - player.r, player.y - player.r, player.r*2, player.r*2);

  ctx.save();
  ctx.beginPath();
  ctx.arc(enemy.x, enemy.y, enemy.r, 0, Math.PI*2);
  ctx.clip();

  ctx.drawImage(enemyImg, enemy.x - enemy.r, enemy.y - enemy.r, enemy.r*2, enemy.r*2);

  ctx.restore();

  points.forEach((p,i)=>{
    drawYarn(p);

    if (dist(player,p) < player.r + p.r) {
      if (p.type === "common") score++;
      if (p.type === "rare") { score++; slowTimer = 90; }
      if (p.type === "epic") score += 3;

      document.getElementById("score").innerText = "Очки: " + score;

      points.splice(i,1);
      spawnPoint();
    }
  });

  if (dist(player, enemy) < player.r + enemy.r) {
    running = false;

    saveScore(score);

    document.getElementById("finalScore").innerText = "Очки: " + score;
    document.getElementById("gameOver").style.display = "flex";
  }

  requestAnimationFrame(update);
}

// ================== МЕНЮ ==================
function startGame() {
  playerName = document.getElementById("nameInput").value.trim();

  if (!playerName) {
    alert("Введите имя!");
    return;
  }

  document.getElementById("menu").style.display = "none";

  init();
  update();
}

function backToMenu() {
  document.getElementById("gameOver").style.display = "none";
  document.getElementById("menu").style.display = "flex";
}

function restart() {
  init();
  update();
}

// старт
update();

</script>

</body>
</html>
