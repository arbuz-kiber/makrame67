<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Побег от Наталии</title>
<style>
  body { margin: 0; overflow: hidden; background: #fff; font-family: Arial, sans-serif; }
  #lobby, #gameOver, #leaderboard { position: fixed; inset: 0; background: rgba(255,255,255,0.95); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10; gap: 15px; }
  button { padding: 12px 30px; font-size: 18px; border: none; border-radius: 8px; background: #ff4d94; color: white; cursor: pointer; }
  input { padding: 12px; width: 280px; margin: 8px 0; border-radius: 8px; border: 2px solid #ddd; }
  .hidden { display: none !important; }
</style>
</head>
<body>

<div id="score" class="hidden">Очки: 0</div>

<div id="lobby">
  <h1>Побег от Наталии 😈</h1>
  <p id="welcomeText">Добро пожаловать!</p>
  <button onclick="startGame()">▶ Играть</button>
  <button onclick="showLeaderboard()">🏆 Таблица лидеров</button>
  <button onclick="showLoginModal()">👤 Войти / Регистрация</button>
</div>

<!-- Login Modal -->
<div id="loginModal" class="hidden" style="position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:20;display:flex;justify-content:center;align-items:center;">
  <div style="background:white;padding:30px;border-radius:12px;width:340px;text-align:center;">
    <h2>Вход / Регистрация</h2>
    <input type="text" id="username" placeholder="Имя пользователя"><br>
    <input type="password" id="password" placeholder="Пароль"><br>
    <button onclick="handleAuth()" style="width:100%;margin:10px 0;">Войти / Зарегистрироваться</button>
    <button onclick="closeLoginModal()" style="background:#666;width:100%;">Отмена</button>
  </div>
</div>

<!-- Leaderboard -->
<div id="leaderboard" class="hidden">
  <h1>🏆 Таблица лидеров</h1>
  <table style="width:80%;max-width:500px;border-collapse:collapse;" id="lbTable"></table>
  <button onclick="hideLeaderboard()">Закрыть</button>
</div>

<!-- Game Over -->
<div id="gameOver" class="hidden">
  <h1>Тебя поймала Наталия 😈</h1>
  <p id="finalScore"></p>
  <button onclick="restart()">Играть снова</button>
  <button onclick="goToLobby()">В лобби</button>
</div>

<canvas id="game"></canvas>

<script>
// ================== НАСТРОЙКИ GITHUB ==================
const GITHUB_REPO = "arbuz-kiber/makrame67";   // ← ИЗМЕНИ НА СВОЙ
const GITHUB_TOKEN = "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";          // ← ВСТАВЬ СВОЙ ТОКЕН
const FILE_USERS = "users.json";
const FILE_LEADERBOARD = "leaderboard.json";

const headers = {
  "Authorization": `token ${GITHUB_TOKEN}`,
  "Accept": "application/vnd.github.v3+json",
  "Content-Type": "application/json"
};

// ================== ПЕРЕМЕННЫЕ ==================
let currentUser = null;
let canvas = document.getElementById("game");
let ctx = canvas.getContext("2d");
// ... (остальной код игры: player, enemy и т.д. можно оставить как раньше)

// ================== РАБОТА С GITHUB ==================
async function getFile(path) {
  const url = `https://api.github.com/repos/${GITHUB_REPO}/contents/${path}`;
  const res = await fetch(url, { headers });
  if (!res.ok) return null;
  const data = await res.json();
  return JSON.parse(atob(data.content));
}

async function updateFile(path, content, message) {
  const url = `https://api.github.com/repos/${GITHUB_REPO}/contents/${path}`;
  let sha = null;

  const existing = await fetch(url, { headers });
  if (existing.ok) {
    const data = await existing.json();
    sha = data.sha;
  }

  const body = {
    message: message,
    content: btoa(JSON.stringify(content, null, 2)),
    sha: sha
  };

  await fetch(url, { method: "PUT", headers, body: JSON.stringify(body) });
}

// ================== АВТОРИЗАЦИЯ ==================
async function handleAuth() {
  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value.trim();

  if (!username || !password) return alert("Заполните все поля");

  let users = await getFile(FILE_USERS) || {};

  if (users[username]) {
    if (users[username] === password) {
      currentUser = { name: username };
      document.getElementById("welcomeText").textContent = `Привет, ${username}!`;
      alert("Вход выполнен успешно!");
    } else {
      return alert("Неверный пароль!");
    }
  } else {
    users[username] = password;
    await updateFile(FILE_USERS, users, `Add user: ${username}`);
    currentUser = { name: username };
    document.getElementById("welcomeText").textContent = `Привет, ${username}!`;
    alert("Аккаунт создан!");
  }
  closeLoginModal();
}

// ================== ЛИДЕРБОРД ==================
async function saveScore(score) {
  if (!currentUser) return;
  let lb = await getFile(FILE_LEADERBOARD) || [];
  
  const existing = lb.findIndex(item => item.name === currentUser.name);
  if (existing !== -1) {
    if (score > lb[existing].score) lb[existing].score = score;
  } else {
    lb.push({ name: currentUser.name, score: score });
  }

  lb.sort((a,b) => b.score - a.score);
  await updateFile(FILE_LEADERBOARD, lb, `Update score: ${currentUser.name} - ${score}`);
}

async function showLeaderboard() {
  const lb = await getFile(FILE_LEADERBOARD) || [];
  const table = document.getElementById("lbTable");
  table.innerHTML = `<tr><th>Место</th><th>Игрок</th><th>Рекорд</th></tr>`;

  lb.forEach((entry, i) => {
    table.innerHTML += `<tr><td>${i+1}</td><td>${entry.name}</td><td>${entry.score}</td></tr>`;
  });

  document.getElementById("leaderboard").classList.remove("hidden");
}

function hideLeaderboard() {
  document.getElementById("leaderboard").classList.add("hidden");
}

// ================== ОСТАЛЬНОЙ КОД ИГРЫ (init, update и т.д.) ==================
// ... вставь сюда весь код игры из предыдущей версии (init, update, spawnPoint и т.д.)

function startGame() {
  if (!currentUser) {
    alert("Сначала войдите в аккаунт!");
    showLoginModal();
    return;
  }
  document.getElementById("lobby").classList.add("hidden");
  init();
  update();
}

// В конце функции поражения (где game over):
// if (currentUser) await saveScore(score);

// Запуск
loadUser(); // если хочешь localStorage как резерв
</script>
</body>
</html>
