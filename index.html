<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Побег от Наталии</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
  body { margin: 0; overflow: hidden; background: #fff; font-family: Arial, sans-serif; color: #333; }
  #lobby, #gameOver, #leaderboard {
    position: fixed; inset: 0; background: rgba(255,255,255,0.96);
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    z-index: 10; gap: 20px;
  }
  #score { position: fixed; top: 15px; left: 15px; font-size: 26px; font-weight: bold; z-index: 100; }
  button { padding: 14px 32px; font-size: 18px; border: none; border-radius: 10px; background: #ff4d94; color: white; cursor: pointer; }
  button:hover { background: #ff3388; }
  input { padding: 14px; width: 300px; font-size: 17px; border: 2px solid #ddd; border-radius: 10px; margin: 8px 0; }
  .hidden { display: none !important; }
  h1 { color: #c026d3; margin: 0; }
</style>
</head>

<body>

<div id="score" class="hidden">Очки: 0</div>

<div id="lobby">
  <h1>Побег от Наталии 😈</h1>
  <p id="welcomeText">Добро пожаловать!</p>
  <button onclick="startGame()">▶ Играть</button>
  <button onclick="showLeaderboard()">🏆 Таблица лидеров</button>
  <button onclick="showLoginModal()">👤 Войти / Регистрация</button>
</div>

<div id="loginModal" class="hidden"
style="position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:20;display:flex;justify-content:center;align-items:center;">
  <div style="background:white;padding:35px;border-radius:16px;width:360px;text-align:center;">
    <h2>Вход / Регистрация</h2>
    <input type="text" id="username" placeholder="Имя пользователя" maxlength="20"><br>
    <input type="password" id="password" placeholder="Пароль" maxlength="20"><br>
    <button onclick="handleAuth()" style="width:100%;margin:15px 0;">Войти / Зарегистрироваться</button>
    <button onclick="closeLoginModal()" style="background:#666;width:100%;">Отмена</button>
  </div>
</div>

<div id="leaderboard" class="hidden">
  <h1>🏆 Таблица лидеров</h1>
  <table style="width:85%;max-width:600px;border-collapse:collapse;" id="lbTable"></table>
  <button onclick="hideLeaderboard()" style="margin-top:20px;">Закрыть</button>
</div>

<div id="gameOver" class="hidden">
  <h1>Тебя поймала Наталия 😈</h1>
  <p id="finalScore" style="font-size:24px;"></p>
  <button onclick="restart()">Играть снова</button>
  <button onclick="goToLobby()">В лобби</button>
</div>

<canvas id="game"></canvas>

<script>
/* ===================== SUPABASE FIX ===================== */
const sb = Supabase.createClient(
  'https://pdsbdrdfdqijamiedeit.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...REPLACE_WITH_YOUR_FULL_KEY'
);

/* ===================== GAME SETUP ===================== */
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let player, enemy, points = [], score = 0, running = false, slowTimer = 0;
let currentUser = null;

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

/* ===================== IMAGES ===================== */
let imagesLoaded = 0;

const playerImg = new Image();
playerImg.src = "https://cdn-icons-png.flaticon.com/512/1946/1946429.png";

const enemyImg = new Image();
enemyImg.src = "https://cdn-icons-png.flaticon.com/512/4140/4140048.png";

playerImg.onload = enemyImg.onload = () => imagesLoaded++;

/* ===================== AUTH ===================== */
async function handleAuth() {
  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value.trim();

  if (!username || !password) return alert("Введите имя и пароль!");

  let { error } = await sb.auth.signInWithPassword({
    email: username + "@game.local",
    password
  });

  if (error) {
    const { error: signUpError } = await sb.auth.signUp({
      email: username + "@game.local",
      password,
      options: { data: { username } }
    });

    if (signUpError) alert(signUpError.message);
    else alert("Аккаунт создан, войдите ещё раз!");
    return;
  }

  currentUser = { name: username };
  document.getElementById("welcomeText").innerText = `Привет, ${username}!`;
  closeLoginModal();
}

function showLoginModal() {
  document.getElementById("loginModal").classList.remove("hidden");
}

function closeLoginModal() {
  document.getElementById("loginModal").classList.add("hidden");
}

/* ===================== LEADERBOARD ===================== */
async function saveScore(finalScore) {
  if (!currentUser) return;

  await sb.from("scores").insert([
    { username: currentUser.name, score: finalScore }
  ]);
}

async function showLeaderboard() {
  const { data } = await sb
    .from("scores")
    .select("username, score")
    .order("score", { ascending: false })
    .limit(20);

  const table = document.getElementById("lbTable");
  table.innerHTML = `
    <tr style="background:#f0f0f0">
      <th>Место</th><th>Игрок</th><th>Очки</th>
    </tr>`;

  (data || []).forEach((row, i) => {
    table.innerHTML += `
      <tr>
        <td style="text-align:center">${i + 1}</td>
        <td>${row.username}</td>
        <td style="text-align:center;font-weight:bold">${row.score}</td>
      </tr>`;
  });

  document.getElementById("leaderboard").classList.remove("hidden");
}

function hideLeaderboard() {
  document.getElementById("leaderboard").classList.add("hidden");
}

/* ===================== GAME ===================== */
function init() {
  player = { x: canvas.width/2, y: canvas.height/2 };
  enemy = { x: 100, y: 100, r: 35, baseSpeed: 2.3, speed: 2.3 };

  points = [];
  score = 0;
  running = true;
  slowTimer = 0;

  document.getElementById("score").classList.remove("hidden");
  document.getElementById("score").innerText = "Очки: 0";
  document.getElementById("gameOver").classList.add("hidden");

  for (let i = 0; i < 6; i++) spawnPoint();
}

function spawnPoint() {
  let rand = Math.random();
  let type = rand < 0.7 ? "common" : rand < 0.9 ? "rare" : "epic";

  points.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: 18,
    type
  });
}

function move(e) {
  const rect = canvas.getBoundingClientRect();
  const x = e.touches ? e.touches[0].clientX : e.clientX;
  const y = e.touches ? e.touches[0].clientY : e.clientY;

  player.x = x - rect.left;
  player.y = y - rect.top;
}

canvas.addEventListener("mousemove", move);
canvas.addEventListener("touchmove", move, { passive: false });

function dist(a, b) {
  return Math.hypot(a.x - b.x, a.y - b.y);
}

function drawPoint(p) {
  ctx.fillStyle =
    p.type === "common" ? "#8B4513" :
    p.type === "rare" ? "#3b82f6" : "#a855f7";

  ctx.beginPath();
  ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
  ctx.fill();
}

function update() {
  if (!running) return;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (slowTimer > 0) {
    slowTimer--;
    enemy.speed = enemy.baseSpeed * 0.5;
  } else {
    enemy.speed = enemy.baseSpeed + score * 0.02;
  }

  let dx = player.x - enemy.x;
  let dy = player.y - enemy.y;
  let d = Math.hypot(dx, dy) || 1;

  enemy.x += (dx / d) * enemy.speed;
  enemy.y += (dy / d) * enemy.speed;

  ctx.drawImage(playerImg, player.x - 25, player.y - 25, 50, 50);

  ctx.drawImage(enemyImg, enemy.x - 25, enemy.y - 25, 50, 50);

  for (let i = points.length - 1; i >= 0; i--) {
    let p = points[i];
    drawPoint(p);

    if (dist(player, p) < 40) {
      score += p.type === "epic" ? 5 : 1;
      if (p.type === "rare") slowTimer = 100;

      document.getElementById("score").innerText = "Очки: " + score;

      points.splice(i, 1);
      spawnPoint();
    }
  }

  if (dist(player, enemy) < 50) {
    running = false;

    document.getElementById("finalScore").innerText =
      `Твой рекорд: ${score}`;

    document.getElementById("gameOver").classList.remove("hidden");

    if (currentUser) saveScore(score);
  }

  requestAnimationFrame(update);
}

/* ===================== CONTROL ===================== */
function startGame() {
  if (!currentUser) {
    alert("Сначала войдите!");
    showLoginModal();
    return;
  }

  document.getElementById("lobby").classList.add("hidden");
  init();
  update();
}

function restart() {
  init();
  update();
}

function goToLobby() {
  document.getElementById("gameOver").classList.add("hidden");
  document.getElementById("lobby").classList.remove("hidden");
  document.getElementById("score").classList.add("hidden");
}

/* INIT */
document.getElementById("lobby").classList.remove("hidden");
</script>

</body>
</html>
